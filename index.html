<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二補碼反轉計算機</title>
    <style>
        :root {
            --primary-color: #4F46E5;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --border-color: #E5E7EB;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .calculator {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
        }

        select, input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        select:focus, input:focus {
            border-color: var(--primary-color);
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row > div {
            flex: 1;
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #4338CA;
        }

        .error {
            color: #DC2626;
            background-color: #FEE2E2;
            padding: 10px;
            border-radius: 6px;
            margin-top: 15px;
            display: none;
            font-size: 14px;
            text-align: center;
        }

        .result-area {
            margin-top: 25px;
            display: none;
        }

        .step-card {
            background-color: #F9FAFB;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
        }

        .step-card h4 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .binary-text {
            font-family: 'Courier New', Courier, monospace;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
            text-align: center;
            color: var(--primary-color);
            word-wrap: break-word;
        }

        .explanation {
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            margin-top: 8px;
        }

        .arrow-down {
            text-align: center;
            color: #9CA3AF;
            font-size: 20px;
            margin: -5px 0 10px 0;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <h2>二補碼反轉計算機</h2>
        
        <div class="row">
            <div class="input-group">
                <label for="bitLength">位元長度 (Bit Length)</label>
                <select id="bitLength">
                    <option value="8">8-bit</option>
                    <option value="16">16-bit</option>
                </select>
            </div>
            <div class="input-group">
                <label for="inputType">輸入進制</label>
                <select id="inputType" onchange="updatePlaceholder()">
                    <option value="10">10進制 (Decimal)</option>
                    <option value="2">2進制 (Binary)</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label for="numberInput">輸入數值</label>
            <input type="text" id="numberInput" placeholder="例如：20 或 -20" autocomplete="off">
        </div>

        <button onclick="calculateTwosComplement()">進行計算</button>

        <div id="errorMessage" class="error"></div>

        <div id="resultArea" class="result-area">
            
            <div class="step-card">
                <h4>Step 1: 原始數值 (絕對值) 的二進制</h4>
                <div id="step1-bin" class="binary-text">00000000</div>
                <div id="step1-exp" class="explanation">先將數值轉為二進制，並補齊位元。</div>
            </div>

            <div class="arrow-down">⬇ 反轉 (0變1, 1變0)</div>

            <div class="step-card">
                <h4>Step 2: 一補碼 (1's Complement)</h4>
                <div id="step2-bin" class="binary-text">11111111</div>
                <div class="explanation">將所有位元反轉，取得一補碼。</div>
            </div>

            <div class="arrow-down">⬇ 加 1</div>

            <div class="step-card" style="border-color: var(--primary-color); background-color: #EEF2FF;">
                <h4 style="color: var(--primary-color);">Step 3: 二補碼 (2's Complement)</h4>
                <div id="step3-bin" class="binary-text">00000000</div>
                <div id="step3-exp" class="explanation" style="color: #4F46E5; font-weight: bold;">這就是該數值負數的電腦儲存格式</div>
            </div>
        </div>
    </div>

    <script>
        function updatePlaceholder() {
            const type = document.getElementById("inputType").value;
            const input = document.getElementById("numberInput");
            if (type === "10") {
                input.placeholder = "例如：20 或 -20";
            } else {
                input.placeholder = "例如：00010100";
            }
            // 清空先前的結果與錯誤
            document.getElementById("resultArea").style.display = "none";
            document.getElementById("errorMessage").style.display = "none";
            input.value = "";
        }

        function showError(msg) {
            const errorDiv = document.getElementById("errorMessage");
            errorDiv.innerText = msg;
            errorDiv.style.display = "block";
            document.getElementById("resultArea").style.display = "none";
        }

        function calculateTwosComplement() {
    const inputStr = document.getElementById("numberInput").value.trim();
    const inputType = document.getElementById("inputType").value;
    const bitLength = parseInt(document.getElementById("bitLength").value);
    
    document.getElementById("errorMessage").style.display = "none";

    if (!inputStr) {
        showError("請輸入數值！");
        return;
    }

    let decimalValue = 0;

    // 1. 解析輸入數值
    if (inputType === "10") {
        if (!/^-?\d+$/.test(inputStr)) {
            showError("請輸入有效的 10 進制整數！");
            return;
        }
        decimalValue = parseInt(inputStr, 10);
    } else {
        if (!/^[01]+$/.test(inputStr)) {
            showError("請輸入有效的 2 進制數值 (只包含 0 或 1)！");
            return;
        }
        // 將二進制視為二補碼有號數值進行解析
        let unsignedVal = parseInt(inputStr, 2);
        let paddedBin = inputStr.padStart(bitLength, '0');
        if (paddedBin[0] === '1') {
            decimalValue = unsignedVal - Math.pow(2, bitLength);
        } else {
            decimalValue = unsignedVal;
        }
    }

    // ==========================================
    // 2. [修改部分] 嚴格檢查有符號整數 (二補碼) 的範圍 
    // 例如 8-bit: 最小值 -128，最大值 127
    // 例如 16-bit: 最小值 -32768，最大值 32767
    // ==========================================
    let maxVal = Math.pow(2, bitLength - 1) - 1; 
    let minVal = -Math.pow(2, bitLength - 1);    

    if (decimalValue > maxVal || decimalValue < minVal) {
        showError(`輸入數值 (${decimalValue}) 超出了 ${bitLength}-bit 二補碼的有效範圍 (${minVal} 至 ${maxVal})。`);
        return;
    }

    // 取得絕對值以進行後續的二進制轉換推導
    let absValue = Math.abs(decimalValue);

    // 3. 計算步驟
    // Step 1: 原始數值絕對值的二進制 (補齊前導 0)
    let originalBin = absValue.toString(2).padStart(bitLength, '0');
    
    let onesComplement, twosComplement;

    if (decimalValue >= 0) {
        // 正數（含 0）：一補碼 = 二補碼 = 原始二進制
        onesComplement = originalBin;
        twosComplement = originalBin;
    } else {
        // 負數：Step 2 一補碼 (反轉 0->1, 1->0)
        onesComplement = originalBin.split('').map(bit => bit === '0' ? '1' : '0').join('');
        // Step 3: 二補碼 (一補碼 + 1)
        let twosValue = BigInt("0b" + onesComplement) + 1n;
        twosComplement = twosValue.toString(2).padStart(bitLength, '0');
        if (twosComplement.length > bitLength) {
            twosComplement = twosComplement.slice(-bitLength);
        }
    }

    // 4. 更新畫面
    // 將二進制每 4 位數加一個空格 (方便閱讀)
    const formatBin = (bin) => bin.match(/.{1,4}/g).join(' ');

    document.getElementById("step1-bin").innerText = formatBin(originalBin);
    if (decimalValue >= 0) {
        document.getElementById("step1-exp").innerText = `數值 ${decimalValue} 的二進制表示`;
        document.getElementById("step3-exp").innerText = `正數的二補碼與原始二進制相同`;
    } else {
        document.getElementById("step1-exp").innerText = `數值 ${absValue} 的二進制表示`;
        document.getElementById("step3-exp").innerText = `此為 -${absValue} 的電腦底層二補碼表示法`;
    }

    document.getElementById("step2-bin").innerText = formatBin(onesComplement);

    document.getElementById("step3-bin").innerText = formatBin(twosComplement);

    // 顯示結果區塊
    document.getElementById("resultArea").style.display = "block";
}
    </script>
</body>
</html>
